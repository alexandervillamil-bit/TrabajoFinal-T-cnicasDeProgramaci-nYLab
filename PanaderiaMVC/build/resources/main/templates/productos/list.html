<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Productos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-4">

<h2>Productos</h2>

<a class="btn btn-primary mb-3" th:href="@{/productos/nuevo}">
    Nuevo Producto
</a>

<table class="table table-bordered">

    <thead>
    <tr>
        <th>ID</th>
        <th>Nombre</th>
        <th>Precio</th>
        <th>Stock</th>
        <th>Categoría</th>
        <th>Acciones</th>
    </tr>
    </thead>

    <tbody>
    <tr th:each="p : ${productos}">
        <td th:text="${p.id}"></td>
        <td th:text="${p.nombre}"></td>
        <td th:text="${p.precio}"></td>
        <td th:text="${p.stock}"></td>
        <td th:text="${p.categoria.nombre}"></td>

        <td>
            <a class="btn btn-warning btn-sm"
               th:href="@{'/productos/editar/' + ${p.id}}">
                Editar
            </a>

            <a class="btn btn-danger btn-sm"
               th:href="@{'/productos/eliminar/' + ${p.id}}">
                Eliminar
            </a>
        </td>
    </tr>
    </tbody>

</table>

<a class="btn btn-secondary" th:href="@{/categorias}">
    Ir a Categorías
</a>

</body>
</html>
