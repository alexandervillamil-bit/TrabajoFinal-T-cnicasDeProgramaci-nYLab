<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Dashboard Panadería</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/estilos.css">
</head>

<body class="container mt-5">

<h1 class="text-center mb-4">🥐 Menú Principal Panadería <\Hello Bread/> 🥐</h1>

<!-- TARJETAS -->
<div class="row text-center">

    <!-- CLIENTES -->
    <div class="col-md-3">
        <div class="card shadow-sm">
            <div class="card-body">
                <h5>Clientes</h5>
                <h3 th:text="${totalClientes}"></h3>
            </div>
        </div>
    </div>

    <!-- PRODUCTOS -->
    <div class="col-md-3">
        <div class="card shadow-sm">
            <div class="card-body">
                <h5>Productos</h5>
                <h3 th:text="${totalProductos}"></h3>
            </div>
        </div>
    </div>

    <!-- VENTAS -->
    <div class="col-md-3">
        <div class="card shadow-sm">
            <div class="card-body">
                <h5>Ventas</h5>
                <h3 th:text="${totalVentas}"></h3>
            </div>
        </div>
    </div>

    <!-- DINERO -->
    <div class="col-md-3">
        <div class="card shadow-sm">
            <div class="card-body">
                <h5>Total dinero</h5>
                <h3 th:text="${totalDinero}"></h3>
            </div>
        </div>
    </div>

</div>

<!-- BOTONES -->
<div class="text-center mt-5">

    <a class="btn btn-primary m-2" href="/clientes">Clientes</a>
    <a class="btn btn-success m-2" href="/productos">Productos</a>
    <a class="btn btn-warning m-2" href="/ventas">Ventas</a>
    <a class="btn btn-secondary m-2" href="/categorias">Categorías</a>

</div>

</body>
</html>
