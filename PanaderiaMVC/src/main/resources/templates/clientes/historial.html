<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Historial Cliente</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-4">

<!-- ENCABEZADO -->
<div class="text-center mb-4">

    <h2>🧾 Historial de Compras</h2>

    <h4 class="text-primary"
        th:text="${cliente.nombre}">
    </h4>

</div>

<!-- TARJETA RESUMEN -->
<div class="card shadow-sm mb-4">

    <div class="card-body text-center">

        <h5>Total gastado por el cliente</h5>

        <h2 class="text-success"
            th:text="'$ ' + ${totalGeneral}">
        </h2>

    </div>

</div>

<!-- TABLA DE VENTAS -->
<table class="table table-hover table-bordered">

    <thead class="table-dark">
    <tr>
        <th>Producto</th>
        <th>Cantidad</th>
        <th>Estado</th>
        <th>Fecha</th>
        <th>Total</th>
    </tr>
    </thead>

    <tbody>

    <!-- SI NO HAY VENTAS -->
    <tr th:if="${ventas.isEmpty()}">
        <td colspan="5" class="text-center text-muted">
            Este cliente aún no tiene compras 🥺
        </td>
    </tr>

    <!-- LISTA DE VENTAS -->
    <tr th:each="v : ${ventas}">

        <td th:text="${v.producto.nombre}"></td>

        <td th:text="${v.cantidad}"></td>

        <td>
            <span class="badge bg-info"
                  th:text="${v.estado}">
            </span>
        </td>

        <td th:text="${v.fecha}"></td>

        <td th:text="'$ ' + ${v.total}"></td>

    </tr>

    </tbody>

</table>

<!-- BOTÓN VOLVER -->
<a class="btn btn-secondary mt-3" th:href="@{/clientes}">
    ⬅ Volver
</a>

</body>
</html>
