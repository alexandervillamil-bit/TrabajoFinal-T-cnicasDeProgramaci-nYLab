<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Historial Cliente</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-4">

<h2 th:text="'Historial de ' + ${cliente.nombre}"></h2>

<table class="table table-bordered table-hover">

    <thead class="table-dark">
    <tr>
        <th>Producto</th>
        <th>Cantidad</th>
        <th>Subtotal</th>
        <th>Total</th>
        <th>Fecha</th>
        <th>Estado</th>
    </tr>
    </thead>

    <tbody>
    <tr th:each="v : ${ventas}">
        <td th:text="${v.producto != null ? v.producto.nombre : ''}"></td>
        <td th:text="${v.cantidad}"></td>
        <td th:text="${v.subtotal}"></td>
        <td th:text="${v.total}"></td>
        <td th:text="${v.fecha}"></td>
        <td th:text="${v.estado}"></td>
    </tr>
    </tbody>

</table>

<h4 class="mt-3">
    💰 Total general:
    <span th:text="${totalGeneral}"></span>
</h4>

<a class="btn btn-secondary mt-3" th:href="@{/clientes}">
    Volver
</a>

</body>
</html>
