<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Formulario Producto</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-4">

<h2 class="mb-3">Nuevo Producto</h2>

<form th:action="@{/productos/guardar}" th:object="${producto}" method="post">

    <input type="hidden" th:field="*{id}"/>

    <!-- Nombre -->
    <div class="mb-3">
        <label>Nombre</label>
        <input type="text" class="form-control" th:field="*{nombre}" required>
    </div>

    <!-- Precio -->
    <div class="mb-3">
        <label>Precio</label>
        <input type="number" step="0.01" class="form-control" th:field="*{precio}" required>
    </div>

    <!-- Stock -->
    <div class="mb-3">
        <label>Stock</label>
        <input type="number" class="form-control" th:field="*{stock}" required>
    </div>

    <!-- Categoría -->
    <div class="mb-3">
        <label>Categoría</label>
        <select class="form-control" th:field="*{categoria}">
            <option th:each="c : ${categorias}"
                    th:value="${c.id}"
                    th:text="${c.nombre}">
            </option>
        </select>
    </div>

    <button type="submit" class="btn btn-success">Guardar</button>
    <a th:href="@{/productos}" class="btn btn-secondary">Volver</a>

</form>

</body>
</html>
