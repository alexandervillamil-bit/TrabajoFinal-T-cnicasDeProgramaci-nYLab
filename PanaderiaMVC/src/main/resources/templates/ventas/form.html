<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nueva Venta</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-4">

<h2>Nueva Venta</h2>

<form th:action="@{/ventas/guardar}" th:object="${venta}" method="post">

    <!-- Cliente -->
    <div class="mb-3">
        <label>Cliente</label>
        <select class="form-control" th:field="*{cliente}">
            <option th:each="c : ${clientes}"
                    th:value="${c}"
                    th:text="${c.nombre}">
            </option>
        </select>
    </div>

    <!-- Producto -->
    <div class="mb-3">
        <label>Producto</label>
        <select class="form-control" th:field="*{producto}">
            <option th:each="p : ${productos}"
                    th:value="${p}"
                    th:text="${p.nombre}">
            </option>
        </select>
    </div>

    <!-- Cantidad -->
    <div class="mb-3">
        <label>Cantidad</label>
        <input type="number" class="form-control" th:field="*{cantidad}" min="1" required>
    </div>

    <!-- Estado -->
    <div class="mb-3">
        <label>Estado</label>
        <select class="form-control" th:field="*{estado}">
            <option th:each="e : ${estados}"
                    th:value="${e}"
                    th:text="${e}">
            </option>
        </select>
    </div>

    <button class="btn btn-success">
        Guardar
    </button>

    <a class="btn btn-secondary" th:href="@{/ventas}">
        Volver
    </a>

</form>

</body>
</html>
