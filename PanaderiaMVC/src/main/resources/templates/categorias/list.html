<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Categorías</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-4">

<h2>Categorías</h2>

<a class="btn btn-primary mb-3" th:href="@{/categorias/nuevo}">
    Nueva Categoría
</a>

<table class="table table-bordered">
    <thead>
    <tr>
        <th>ID</th>
        <th>Nombre</th>
        <th>Acciones</th>
    </tr>
    </thead>

    <tbody>
    <tr th:each="c : ${categorias}">
        <td th:text="${c.id}"></td>
        <td th:text="${c.nombre}"></td>
        <td>
            <a class="btn btn-warning btn-sm"
               th:href="@{'/categorias/editar/' + ${c.id}}">
                Editar
            </a>

            <a class="btn btn-danger btn-sm"
               th:href="@{'/categorias/eliminar/' + ${c.id}}">
                Eliminar
            </a>
        </td>
    </tr>
    </tbody>
</table>

<a th:href="@{/productos}" class="btn btn-secondary">
    Ir a Productos
</a>

</body>
</html>
