<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Análisis de Productos</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <meta charset="UTF-8">
</head>
<style>
    body{
        font-family: Arial, sans-serif;
        background: #141414;
        margin: 0;
        padding: 3px;
        color: white;
    }
    .container{
        max-width: 1100px;
        margin: auto;
    }
    .titulo{
        text-aling: center;
        margin-bottom: 30px;
   </html>
    }
    .cards{
       display: flex;
       gap: 20px;
       margi-bottom: 30px;
       flex-wrap: wrap;

    }
    .card{
       flex: 1;
       min-width: 220px;
       background: #FF9929;
       padding: 10px;
       border-radius: 14px;
       box-shadow: 0 4px 14px black;
       text-align: center;
       border-top: 4px solid #FF832B;
    }
    table{
        width: 100%;
        border-collapse: collapse;
    }

    th {
        background: #FF832B;
        color: white;
        padding: 12px;
    }

    td {
        padding: 12px;
        border-bottom: 1px solid #e5e7eb;
        text-align: center;
    }

    tr:hover {
        background: #FF832B;
    }

    .chart-container {
        height: 420px;
    }
    .section{
        background: #FF9929;
        padding: 25px;
        border-radius: 14px;
        box-shadow: 0 4px 14px black;
        margin-bottom: 30px;
    }
</style>
<body>
<div class ="container">
    <div class="titulo">
        <h1>Análisis de productos</h1>
        <p>Lectura de archivo csv - usando java, spring boot</p>
    </div>
    <div class = "cards">
        <div class = "card">
            <h3>Promedio</h3>
            <p th:text="${#numbers.formatDecimal(promedio,1,2)}"></p>
        </div>
        <div class = "card">
            <h3>Producto Más Costoso</h3>
            <p th:text="${masCostoso.nombre}"></p>
        </div>
        <div class = "card">
            <h3>Producto Más Barato</h3>
            <p th:text="${masBarato.nombre}"></p>
        </div>
    </div>
    <br>
    <br>
    <div class="section">
        <h2>Listado de productos</h2>
        <table border="0">
            <tr>
                <th>Producto</th>
                <th>Precio</th>
            </tr>
            <tr th:each="p : ${productos}">
                <td th:text="${p.nombre}"></td>
                <td th:text="${p.precio}"></td>
            </tr>
        </table>
        <br>
        <br>
        <br>
        <br>
        <div class="section">
            <h2>Gráfico de barras</h2>

            <div class="chart-container">
                <canvas id="grafico"></canvas>
            </div>
        </div>

    </div>

    <script th:inline="javascript">
        const productos = [[${productos}]];

        const nombres = productos.map(p => p.nombre);
        const precios = productos.map(p => p.precio);

        new Chart(document.getElementById('grafico'), {
            type: 'bar',
            data: {
                labels: nombres,
                datasets: [{
                    label: 'Precio del producto',
                    data: precios,
                    borderWidth: 1,
                    backgroundColor: 'rgba(255, 227, 43, 0.5)'
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false
            }
        });
    </script>


    </div>
</div>
</body>
